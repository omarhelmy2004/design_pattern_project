spring:
  application:
    name: withme-backend
  
  datasource:
    url: jdbc:mysql://localhost:3306/withme_db
    username: root
    password: password
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
  
  mvc:
    cors:
      allowed-origins: "http://localhost:3000,http://localhost:5173"
      allowed-methods: "GET,POST,PUT,DELETE,OPTIONS"
      allowed-headers: "*"
      allow-credentials: true

server:
  port: 8080
  servlet:
    context-path: /api

jwt:
  secret: your-super-secret-jwt-key-change-in-production-environment
  expiration: 86400000  # 24 hours in milliseconds

llm:
  provider: openai
  api-key: ${LLM_API_KEY:your-api-key}
  model: gpt-3.5-turbo
  max-tokens: 500

logging:
  level:
    root: INFO
    com.withme: DEBUG
